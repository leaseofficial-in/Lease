<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"/>
  <title>Dashboard · RentyBase</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────── */
    :root {
      --rb-action:#0F4C5C; --rb-action-hover:#0A3A47; --rb-action-soft:#DDE8EB;
      --rb-accent:#C97A3A; --rb-accent-soft:#F4E5D4;
      --rb-ink:#0E1413; --rb-ink-2:#2A332F; --rb-ink-3:#5C645F;
      --rb-canvas:#F6F4EE; --rb-canvas-2:#EFEDE5;
      --rb-surface:#FFFFFF;
      --rb-fill:#F0EFE9; --rb-fill-2:#E6E2D7;
      --rb-border:#E6E2D7; --rb-border-soft:#EBE7DB; --rb-border-strong:#D4CFBE;
      --rb-success:#1F7A55; --rb-success-soft:#DEEFE6;
      --rb-warning:#B8740F; --rb-warning-soft:#F6E6CA;
      --rb-danger:#B33A2E; --rb-danger-soft:#F3DAD6;
      --rb-font-display:'Instrument Serif','Iowan Old Style',Georgia,serif;
      --rb-font-sans:'DM Sans',system-ui,-apple-system,sans-serif;
      --rb-font-mono:'JetBrains Mono',ui-monospace,monospace;
      --rb-ease:cubic-bezier(0.22,1,0.36,1);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--rb-font-sans);background:var(--rb-canvas-2);color:var(--rb-ink);-webkit-font-smoothing:antialiased;min-height:100vh;touch-action:pan-y;-webkit-text-size-adjust:100%;}
    a{color:inherit;text-decoration:none;}

    /* ── Loading / error ───────────────────────── */
    .d-loading{display:grid;place-items:center;min-height:100vh;}
    .spin{width:44px;height:44px;border:3px solid rgba(15,76,92,.12);border-top-color:var(--rb-action);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .d-error{display:none;place-items:center;min-height:100vh;padding:24px;}
    .d-error-inner{text-align:center;max-width:340px;}
    .d-error-icon{font-size:40px;margin-bottom:16px;}
    .d-error-h{font-family:var(--rb-font-display);font-size:28px;color:var(--rb-ink);}
    .d-error-p{font-size:14px;color:var(--rb-ink-3);margin-top:8px;line-height:1.6;}

    /* ── Shell layout ──────────────────────────── */
    .d-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

    /* ── Sidebar ───────────────────────────────── */
    .d-side{padding:28px 18px;background:var(--rb-canvas);border-right:1px solid var(--rb-border);display:flex;flex-direction:column;gap:28px;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .d-logo{display:flex;align-items:center;gap:10px;font-family:var(--rb-font-display);font-weight:800;font-size:19px;letter-spacing:-.02em;color:var(--rb-ink);padding:0 8px;}
    .d-logo .ochre{color:var(--rb-accent);}
    .d-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
    .d-nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:transparent;border:0;font:inherit;font-size:14px;color:var(--rb-ink-2);cursor:pointer;text-align:left;transition:all .2s;width:100%;}
    .d-nav-item:hover{background:var(--rb-fill);color:var(--rb-ink);}
    .d-nav-item.active{background:var(--rb-ink);color:var(--rb-canvas);}
    .d-nav-ico{width:22px;text-align:center;font-size:15px;flex-shrink:0;}
    .d-badge{margin-left:auto;font-family:var(--rb-font-mono);font-size:10px;font-weight:700;padding:2px 7px;background:var(--rb-accent);color:#fff;border-radius:999px;}
    .d-nav-item.active .d-badge{background:var(--rb-accent);}
    .d-side-foot{padding-top:18px;border-top:1px solid var(--rb-border);}
    .d-user{display:flex;gap:10px;align-items:center;padding:6px 6px 12px;}
    .d-avatar{width:34px;height:34px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:700;font-family:var(--rb-font-display);font-size:16px;overflow:hidden;flex-shrink:0;}
    .d-avatar img{width:100%;height:100%;object-fit:cover;}
    .d-user-name{font-size:13px;font-weight:600;color:var(--rb-ink);}
    .d-user-meta{font-size:11px;color:var(--rb-ink-3);}
    .d-logout{display:block;padding:8px 12px;font-size:12px;color:var(--rb-ink-3);border-radius:8px;border:0;background:transparent;cursor:pointer;font:inherit;text-align:left;width:100%;}
    .d-logout:hover{color:var(--rb-ink);background:var(--rb-fill);}

    /* ── Main ──────────────────────────────────── */
    .d-main{padding:32px 36px 60px;max-width:1200px;min-width:0;}
    .d-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--rb-ink-3);}
    .d-h1{font-family:var(--rb-font-display);font-size:40px;font-weight:400;letter-spacing:-.025em;line-height:1.05;color:var(--rb-ink);margin-top:4px;}
    .d-sub{color:var(--rb-ink-2);margin-top:6px;font-size:14px;line-height:1.55;}
    .d-sub b{color:var(--rb-ink);font-weight:600;}

    /* ── Grid + cards ──────────────────────────── */
    .d-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
    .card{background:var(--rb-canvas);border:1px solid var(--rb-border-soft);border-radius:16px;padding:22px;box-shadow:0 1px 2px rgba(20,18,12,.03);}
    .span-2{grid-column:span 2;}
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:16px;}
    .card h3{font-family:var(--rb-font-display);font-size:22px;font-weight:400;letter-spacing:-.015em;line-height:1.1;}
    .card-sub{font-size:12px;color:var(--rb-ink-3);display:block;margin-top:4px;}

    /* ── Buttons ───────────────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;border:1px solid transparent;font-family:var(--rb-font-sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--rb-ease);text-decoration:none;}
    .btn.sm{padding:7px 14px;font-size:12px;}
    .btn-primary{background:var(--rb-action);color:#fff;}
    .btn-primary:hover{background:var(--rb-action-hover);}
    .btn-ghost{background:transparent;color:var(--rb-ink);border-color:var(--rb-border);}
    .btn-ghost:hover{background:var(--rb-fill);border-color:var(--rb-border-strong);}

    /* ── Hero (landlord) ───────────────────────── */
    .d-hero-card{grid-column:span 2;background:linear-gradient(135deg,#0F4C5C 0%,#163A47 100%);color:#F6F4EE;border:0;}
    .d-hero-meta{font-family:var(--rb-font-mono);font-size:11px;letter-spacing:.14em;color:rgba(246,244,238,.6);}
    .d-hero-num{font-family:var(--rb-font-display);font-size:56px;line-height:1;letter-spacing:-.025em;margin-top:10px;}
    .d-of{font-size:24px;color:rgba(246,244,238,.5);}
    .d-bar{height:6px;background:rgba(246,244,238,.12);border-radius:999px;margin-top:18px;overflow:hidden;}
    .d-bar-f{height:100%;background:var(--rb-accent);border-radius:999px;}
    .d-hero-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(246,244,238,.12);}
    .d-stat-l{font-size:11px;color:rgba(246,244,238,.55);letter-spacing:.08em;text-transform:uppercase;}
    .d-stat-v{font-family:var(--rb-font-display);font-size:24px;margin-top:4px;}
    .d-stat-v.ochre{color:var(--rb-accent);}
    .d-stat-of{font-size:14px;color:rgba(246,244,238,.5);}

    /* ── Score card ────────────────────────────── */
    .d-score-tag{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--rb-ink-3);}
    .d-score-num{font-family:var(--rb-font-display);font-size:64px;line-height:1;margin-top:10px;letter-spacing:-.03em;color:var(--rb-accent);}
    .d-score.tenant .d-score-num{color:var(--rb-action);}
    .d-score-band{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.12em;background:var(--rb-accent-soft);color:var(--rb-accent);}
    .d-score-band.action{background:var(--rb-action-soft);color:var(--rb-action);}
    .d-score-rows{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
    .d-score-rows .b span{font-size:12px;color:var(--rb-ink-2);}
    .d-score-rows .bar{height:4px;background:var(--rb-fill-2);border-radius:4px;margin-top:4px;overflow:hidden;}
    .d-score-rows .bar div{height:100%;background:var(--rb-accent);border-radius:4px;}
    .d-score-rows .bar.action div{background:var(--rb-action);}
    .d-score-foot{margin-top:18px;padding-top:14px;border-top:1px dashed var(--rb-border);font-size:12px;color:var(--rb-ink-3);}

    /* ── Properties list ───────────────────────── */
    .d-props-list{display:flex;flex-direction:column;gap:10px;}
    .d-prop{display:grid;grid-template-columns:56px 1fr auto;gap:16px;align-items:center;padding:12px;background:var(--rb-surface);border:1px solid var(--rb-border-soft);border-radius:12px;transition:all .2s;}
    .d-prop:hover{border-color:var(--rb-border-strong);transform:translateX(2px);}
    .d-prop-thumb{width:56px;height:56px;border-radius:8px;}
    .d-prop-city{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--rb-ink-3);font-weight:600;}
    .d-prop-addr{font-family:var(--rb-font-display);font-size:18px;line-height:1.15;letter-spacing:-.01em;margin-top:2px;}
    .d-prop-tenant{font-size:12px;color:var(--rb-ink-3);margin-top:2px;}
    .d-prop-r{text-align:right;}
    .d-prop-rent{font-family:var(--rb-font-display);font-size:22px;letter-spacing:-.015em;}
    .d-prop-rent span{font-size:12px;color:var(--rb-ink-3);margin-left:2px;}
    .d-prop-pill{font-family:var(--rb-font-mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;margin-top:4px;display:inline-block;letter-spacing:.04em;}
    .d-prop-pill.paid{background:var(--rb-action-soft);color:var(--rb-action);}
    .d-prop-pill.due{background:var(--rb-warning-soft);color:var(--rb-warning);}
    .d-prop-pill.pending{background:var(--rb-accent-soft);color:var(--rb-accent);}
    .d-prop-pill.none{background:var(--rb-fill-2);color:var(--rb-ink-3);}

    /* ── Quick actions ─────────────────────────── */
    .d-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
    .d-action{padding:14px;background:var(--rb-surface);border:1px solid var(--rb-border-soft);border-radius:10px;text-align:left;cursor:pointer;transition:all .2s;font:inherit;display:flex;flex-direction:column;gap:4px;}
    .d-action:hover{border-color:var(--rb-accent);background:var(--rb-accent-soft);}
    .d-action span{font-size:18px;}
    .d-action b{font-size:13px;color:var(--rb-ink);font-weight:600;}
    .d-action i{font-style:normal;font-size:11px;color:var(--rb-ink-3);}

    /* ── Ledger table ──────────────────────────── */
    .d-tabs{display:inline-flex;padding:3px;background:var(--rb-fill);border-radius:8px;gap:2px;}
    .d-tabs button{border:0;background:transparent;padding:5px 12px;border-radius:6px;font:inherit;font-size:12px;color:var(--rb-ink-3);cursor:pointer;}
    .d-tabs button.on{background:var(--rb-canvas);color:var(--rb-ink);font-weight:600;}
    .d-table{width:100%;border-collapse:collapse;}
    .d-table th{text-align:left;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--rb-ink-3);font-weight:700;padding:10px 8px;border-bottom:1px solid var(--rb-border);}
    .d-table td{padding:12px 8px;font-size:13px;border-bottom:1px solid var(--rb-border-soft);color:var(--rb-ink-2);}
    .d-table tr:last-child td{border-bottom:0;}
    .d-table .right{text-align:right;}
    .d-table .pos{color:var(--rb-action);font-weight:600;}
    .d-table .neg{color:var(--rb-warning);}
    .d-table .muted{color:var(--rb-ink-3);}
    .d-tag{font-family:var(--rb-font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:8px;letter-spacing:.04em;}
    .d-tag.in{background:var(--rb-action-soft);color:var(--rb-action);}
    .d-tag.out{background:var(--rb-warning-soft);color:var(--rb-warning);}
    .d-tag.doc{background:var(--rb-accent-soft);color:var(--rb-accent);}
    .d-tag.sys{background:var(--rb-fill-2);color:var(--rb-ink-3);}
    .mono{font-family:var(--rb-font-mono);}

    /* ── Tenant: Rent card ─────────────────────── */
    .d-rent-card{grid-column:span 2;background:linear-gradient(135deg,#14403E,#0F2A2D);color:#F6F4EE;border:0;}
    .d-rent-tag{font-family:var(--rb-font-mono);font-size:11px;letter-spacing:.14em;color:rgba(246,244,238,.6);}
    .d-rent-row{display:flex;align-items:baseline;gap:24px;margin-top:14px;flex-wrap:wrap;}
    .d-rent-num{font-family:var(--rb-font-display);font-size:64px;line-height:1;letter-spacing:-.03em;}
    .d-rent-due{color:rgba(246,244,238,.78);font-size:15px;}
    .d-rent-due b{color:var(--rb-accent);}
    .d-rent-cta{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;}
    .d-rent-paid-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(31,122,85,.25);border:1px solid rgba(31,122,85,.35);border-radius:999px;font-size:13px;font-weight:600;color:#A8E6C8;}
    .d-rent-foot{margin-top:22px;padding-top:18px;border-top:1px solid rgba(246,244,238,.12);display:flex;justify-content:space-between;gap:16px;font-size:12px;color:rgba(246,244,238,.65);}
    .d-rent-foot i{font-style:normal;color:var(--rb-accent);margin-left:4px;}

    /* ── HRA Receipts ──────────────────────────── */
    .d-recs{display:flex;flex-direction:column;gap:6px;}
    .d-rec{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:10px 12px;background:var(--rb-surface);border-radius:10px;}
    .d-rec-m{font-size:11px;letter-spacing:.1em;color:var(--rb-ink-3);font-weight:600;}
    .d-rec-n{font-size:11px;color:var(--rb-ink-3);margin-top:2px;}
    .d-rec-amt{font-family:var(--rb-font-display);font-size:18px;color:var(--rb-ink);}
    .d-rec-st{width:24px;height:24px;border-radius:50%;background:var(--rb-action-soft);color:var(--rb-action);display:grid;place-items:center;font-size:12px;font-weight:700;}
    .d-rec-tot{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px dashed var(--rb-border);font-size:13px;color:var(--rb-ink-2);align-items:center;}
    .d-rec-tot b{font-family:var(--rb-font-display);font-size:22px;color:var(--rb-action);letter-spacing:-.015em;}

    /* ── Repairs ───────────────────────────────── */
    .d-req{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:12px;border-radius:10px;background:var(--rb-surface);margin-bottom:8px;}
    .d-req-dot{width:8px;height:8px;border-radius:50%;}
    .d-req-dot.open{background:var(--rb-accent);animation:dotPulse 1.6s ease-in-out infinite;}
    .d-req-dot.progress{background:var(--rb-warning);animation:dotPulse 1.6s ease-in-out infinite;}
    .d-req-dot.done{background:var(--rb-action);}
    @keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
    .d-req-t{font-size:14px;font-weight:600;color:var(--rb-ink);}
    .d-req-m{font-size:12px;color:var(--rb-ink-3);margin-top:2px;}
    .d-req-st{font-family:var(--rb-font-mono);font-size:9px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.04em;}
    .d-req-st.open{background:var(--rb-accent-soft);color:var(--rb-accent);}
    .d-req-st.in{background:var(--rb-warning-soft);color:var(--rb-warning);}
    .d-req-st.done{background:var(--rb-action-soft);color:var(--rb-action);}

    /* ── Proof photo grid ──────────────────────── */
    .d-proof-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .d-proof-tile{aspect-ratio:1;border-radius:8px;position:relative;overflow:hidden;}
    .d-proof-tile::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.55));}
    .d-proof-cap{position:absolute;bottom:8px;left:10px;color:#fff;font-size:11px;font-weight:600;z-index:1;}

    /* ── Empty state ───────────────────────────── */
    .d-empty{text-align:center;padding:40px 20px;color:var(--rb-ink-3);}
    .d-empty-icon{font-size:32px;margin-bottom:12px;}
    .d-empty p{font-size:14px;line-height:1.6;}

    /* ── No rental banner ──────────────────────── */
    .d-onboard{background:linear-gradient(135deg,var(--rb-action),var(--rb-action-hover));border-radius:16px;padding:28px 32px;color:#F6F4EE;margin-bottom:18px;}
    .d-onboard h2{font-family:var(--rb-font-display);font-size:28px;font-weight:400;letter-spacing:-.02em;margin-top:6px;}
    .d-onboard p{font-size:14px;color:rgba(246,244,238,.8);margin-top:8px;line-height:1.55;}
    .d-onboard-cta{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;}
    .btn-onboard{background:rgba(246,244,238,.15);color:#F6F4EE;border-color:rgba(246,244,238,.3);}
    .btn-onboard:hover{background:rgba(246,244,238,.25);}

    /* ── Action buttons ───────────────────────── */
    .act-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:999px;border:0;font-family:var(--rb-font-sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s var(--rb-ease);}
    .act-btn.primary{background:var(--rb-action);color:#fff;}
    .act-btn.primary:hover{background:var(--rb-action-hover);}
    .act-btn.accent{background:var(--rb-accent);color:#fff;}
    .act-btn.ghost{background:var(--rb-fill-2);color:var(--rb-ink);}
    .act-btn.ghost:hover{background:var(--rb-border);}
    .act-btn.success{background:var(--rb-success-soft);color:var(--rb-success);}
    .act-btn.danger{background:var(--rb-danger-soft);color:var(--rb-danger);}
    .act-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--rb-border-soft);}

    /* ── Modal ─────────────────────────────────── */
    .modal-bg{position:fixed;inset:0;z-index:500;background:rgba(14,20,19,.55);backdrop-filter:blur(5px);display:grid;place-items:center;padding:20px;}
    .modal{background:var(--rb-canvas);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .28s var(--rb-ease);}
    @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
    .modal h2{font-family:var(--rb-font-display);font-size:26px;font-weight:400;letter-spacing:-.02em;margin-bottom:18px;}
    .modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border:0;background:var(--rb-fill-2);border-radius:50%;cursor:pointer;font-size:18px;line-height:1;display:grid;place-items:center;color:var(--rb-ink-3);}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--rb-ink-3);margin-bottom:5px;letter-spacing:.1em;text-transform:uppercase;}
    .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--rb-border);border-radius:10px;font-family:var(--rb-font-sans);font-size:14px;color:var(--rb-ink);background:var(--rb-surface);outline:none;transition:border .2s;-webkit-appearance:none;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rb-action);}
    .field textarea{resize:vertical;min-height:80px;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--rb-border);}

    /* ── Toast ─────────────────────────────────── */
    #toast-wrap{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
    .toast{background:var(--rb-ink);color:var(--rb-canvas);padding:11px 20px;border-radius:999px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .3s var(--rb-ease);pointer-events:none;}
    .toast.success{background:var(--rb-success);}
    .toast.error{background:var(--rb-danger);}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

    /* ── Mobile nav elements (hidden on desktop) ── */
    .m-head{display:none;}
    .m-tabs{display:none;}

    /* ── Responsive: tablet ────────────────────── */
    @media(max-width:1100px) and (min-width:768px){
      .d-shell{grid-template-columns:1fr;}
      .d-side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;gap:12px;align-items:center;padding:14px 16px;}
      .d-nav{flex-direction:row;overflow-x:auto;flex:none;gap:4px;}
      .d-nav-item{padding:7px 10px;font-size:13px;white-space:nowrap;}
      .d-side-foot{display:none;}
      .d-grid{grid-template-columns:1fr;}
      .span-2{grid-column:auto;}
      .d-hero-num{font-size:40px;}
      .d-score-num{font-size:48px;}
      .d-rent-num{font-size:48px;}
      .d-proof-grid{grid-template-columns:repeat(3,1fr);}
    }

    /* ── Mobile: true app layout ───────────────── */
    @media(max-width:767px){
      /* Kill the desktop sidebar completely */
      .d-side{display:none!important;}
      .d-shell{display:block;}

      /* Push content between fixed header and fixed tab bar */
      .d-main{padding:72px 16px 96px;max-width:100%;}

      /* Fixed top header */
      .m-head{
        display:flex;position:fixed;top:0;left:0;right:0;z-index:200;
        background:var(--rb-canvas);border-bottom:1px solid var(--rb-border);
        padding:13px 18px;align-items:center;justify-content:space-between;
      }
      .m-head-logo{
        display:flex;align-items:center;gap:9px;
        font-family:var(--rb-font-display);font-size:18px;color:var(--rb-ink);
        text-decoration:none;
      }

      /* Fixed bottom tab bar */
      .m-tabs{
        display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;
        background:var(--rb-surface);border-top:1px solid var(--rb-border);
        padding:8px 0 max(10px, env(safe-area-inset-bottom,10px));
        box-shadow:0 -1px 0 var(--rb-border);
      }
      .m-tab{
        flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
        padding:5px 2px;border:0;background:transparent;cursor:pointer;
        font-family:var(--rb-font-sans);color:var(--rb-ink-3);min-width:0;
        transition:color .18s;
      }
      .m-tab.active{color:var(--rb-action);}
      .m-tab-ico{font-size:20px;line-height:1.2;}
      .m-tab-lbl{font-size:9px;font-weight:600;letter-spacing:.01em;text-align:center;}

      /* Card grid becomes single-column stack */
      .d-grid{display:flex;flex-direction:column;gap:14px;}
      .span-2,.d-hero-card,.d-rent-card{grid-column:auto;width:100%;}

      /* Typography scale-down */
      .d-h1{font-size:28px;}
      .d-hero-num{font-size:36px;}
      .d-score-num{font-size:48px;}
      .d-rent-num{font-size:44px;}
      .d-hero-row{grid-template-columns:1fr 1fr;}
      .d-action-grid{grid-template-columns:1fr 1fr;}
      .d-proof-grid{grid-template-columns:repeat(2,1fr);}
      .d-top{margin-bottom:20px;}
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="d-loading" id="loading">
    <div class="spin"></div>
  </div>

  <!-- Error -->
  <div class="d-error" id="err-wrap">
    <div class="d-error-inner">
      <div class="d-error-icon">⚠</div>
      <h2 class="d-error-h">Not signed in</h2>
      <p class="d-error-p">Your session has expired. Please sign in again to access your dashboard.</p>
      <a href="/signin" class="btn btn-primary" style="margin-top:24px;display:inline-flex;">Sign in →</a>
    </div>
  </div>

  <!-- App shell -->
  <div class="d-shell" id="app-shell" style="display:none">
    <!-- Sidebar -->
    <aside class="d-side">
      <a href="/" class="d-logo">
        <svg viewBox="0 0 40 40" width="28" height="28" aria-hidden="true">
          <rect width="40" height="40" rx="9" fill="#0E1413"/>
          <path d="M20 7 L34 19 V31 a3 3 0 0 1 -3 3 H9 a3 3 0 0 1 -3 -3 V19 Z" fill="#F6F4EE"/>
          <path d="M13 34 V25 a7 7 0 0 1 14 0 V34 Z" fill="#0E1413"/>
          <rect x="13" y="33" width="14" height="1.4" fill="#C97A3A"/>
        </svg>
        Renty<span class="ochre">Base</span>
      </a>
      <nav class="d-nav" id="sidebar-nav"></nav>
      <div class="d-side-foot">
        <div class="d-user">
          <div class="d-avatar" id="side-avatar" style="background:linear-gradient(135deg,#0F4C5C,#163A47)">–</div>
          <div>
            <div class="d-user-name" id="side-name">–</div>
            <div class="d-user-meta" id="side-meta">–</div>
          </div>
        </div>
        <button class="d-logout" id="signout-btn">Sign out</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="d-main" id="main-content"></main>
  </div>

  <!-- Modal overlay -->
  <div class="modal-bg" id="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-inner"></div>
  </div>
  <!-- Toast container -->
  <div id="toast-wrap"></div>

  <!-- Mobile header (CSS shows this only below 768px) -->
  <div class="m-head">
    <a href="/" class="m-head-logo">
      <svg viewBox="0 0 40 40" width="26" height="26" aria-hidden="true">
        <rect width="40" height="40" rx="9" fill="#0E1413"/>
        <path d="M20 7 L34 19 V31 a3 3 0 0 1 -3 3 H9 a3 3 0 0 1 -3 -3 V19 Z" fill="#F6F4EE"/>
        <path d="M13 34 V25 a7 7 0 0 1 14 0 V34 Z" fill="#0E1413"/>
        <rect x="13" y="33" width="14" height="1.4" fill="#C97A3A"/>
      </svg>
      Renty<span style="color:#C97A3A">Base</span>
    </a>
    <div class="d-avatar" id="m-avatar" style="width:32px;height:32px;font-size:13px;background:linear-gradient(135deg,#0F4C5C,#163A47)">–</div>
  </div>

  <!-- Mobile bottom tab bar (CSS shows this only below 768px) -->
  <div class="m-tabs" id="m-tabs"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  (async () => {
    const { createClient } = window.supabase;
    const sb = createClient(
      'https://tuojgwrzfecyeiccdrlj.supabase.co',
      'sb_publishable_jKQSCW7n3hwESw6YHKrZWQ_r3fk62WF'
    );

    // ── Helpers ──────────────────────────────────
    const $ = id => document.getElementById(id);
    const inr = n => '₹' + Number(n || 0).toLocaleString('en-IN');
    const now = new Date();
    const currentMonth = now.toISOString().slice(0, 7);

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthLabel = s => {
      if (!s) return '';
      const [y, m] = s.split('-');
      return `${MONTHS[parseInt(m) - 1]} ${y}`;
    };
    const relDate = isoStr => {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    };
    const daysUntil = isoStr => {
      if (!isoStr) return 0;
      return Math.max(0, Math.ceil((new Date(isoStr) - now) / 86400000));
    };
    const scoreBand = score => {
      if (score >= 850) return { label: 'EXCELLENT', cls: 'action' };
      if (score >= 750) return { label: 'TRUSTED', cls: '' };
      if (score >= 650) return { label: 'GOOD', cls: '' };
      if (score >= 550) return { label: 'FAIR', cls: '' };
      return { label: 'BUILDING', cls: '' };
    };
    const THUMB_COLORS = ['#a87a4f','#9aa6a3','#c9a878','#a89280','#7a5d35','#5b3a20','#4f5e5b','#5e483a'];

    const show = id => {
      $('loading').style.display   = id === 'loading'   ? 'grid' : 'none';
      $('err-wrap').style.display  = id === 'err-wrap'  ? 'grid' : 'none';
      // Clear inline style on app-shell so CSS media queries control display
      // (setting 'grid' inline would override the mobile display:block rule)
      $('app-shell').style.display = id === 'app-shell' ? '' : 'none';
    };

    // ── Auth ──────────────────────────────────────
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = '/signin';
    });

    let session, user, profile;
    try {
      const res = await sb.auth.getSession();
      session = res.data?.session;
      if (!session) { show('err-wrap'); return; }
      user = session.user;

      const { data: prof } = await sb.from('profiles')
        .select('*')
        .eq('id', user.id)
        .maybeSingle();
      profile = prof;
    } catch (e) {
      console.error(e);
      show('err-wrap');
      return;
    }

    // ── Populate sidebar user ─────────────────────
    const name = profile?.full_name || user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
    const firstName = name.split(' ')[0];
    const avatarUrl = profile?.avatar_url || user.user_metadata?.avatar_url;
    const role = profile?.role || null;

    const sideAvatar = $('side-avatar');
    const mAvatar = $('m-avatar');
    if (avatarUrl) {
      sideAvatar.innerHTML = `<img src="${avatarUrl}" alt="${name}"/>`;
      mAvatar.innerHTML = `<img src="${avatarUrl}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    } else {
      const initial = firstName.charAt(0).toUpperCase();
      const avatarBg = role === 'tenant'
        ? 'linear-gradient(135deg,#c9b388,#7a6042)'
        : 'linear-gradient(135deg,#0F4C5C,#163A47)';
      sideAvatar.textContent = initial;
      sideAvatar.style.background = avatarBg;
      mAvatar.textContent = initial;
      mAvatar.style.background = avatarBg;
    }
    $('side-name').textContent = name;

    // ── Sidebar nav ───────────────────────────────
    const lNavItems = [
      { k: 'home', icon: '⌂', label: 'Overview',    short: 'Home' },
      { k: 'props', icon: '▦', label: 'Properties', short: 'Props' },
      { k: 'led', icon: '≡', label: 'Ledger',       short: 'Ledger' },
      { k: 'hra', icon: '₹', label: 'Receipts',     short: 'Receipts' },
      { k: 'rep', icon: '⚙', label: 'Repairs',      short: 'Repairs' },
    ];
    const tNavItems = [
      { k: 'home', icon: '⌂', label: 'My place',      short: 'Home' },
      { k: 'pay', icon: '₹', label: 'Pay rent',        short: 'Pay' },
      { k: 'hra', icon: '📄', label: 'HRA receipts',   short: 'HRA' },
      { k: 'proof', icon: '📷', label: 'Move-in proof', short: 'Proof' },
      { k: 'rep', icon: '⚙', label: 'Repairs',         short: 'Repairs' },
    ];

    let activeView = 'home';
    const navItems = role === 'landlord' ? lNavItems : tNavItems;

    function renderNav() {
      // Desktop sidebar
      $('sidebar-nav').innerHTML = navItems.map(it =>
        `<button class="d-nav-item${activeView === it.k ? ' active' : ''}" data-view="${it.k}">
          <span class="d-nav-ico">${it.icon}</span>
          <span>${it.label}</span>
        </button>`
      ).join('');
      $('sidebar-nav').querySelectorAll('.d-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          activeView = btn.dataset.view;
          renderNav();
          renderMain();
        });
      });

      // Mobile tab bar (uses short labels to fit 5 tabs)
      const mTabs = $('m-tabs');
      if (mTabs) {
        mTabs.innerHTML = navItems.map(it =>
          `<button class="m-tab${activeView === it.k ? ' active' : ''}" data-view="${it.k}">
            <span class="m-tab-ico">${it.icon}</span>
            <span class="m-tab-lbl">${it.short || it.label}</span>
          </button>`
        ).join('');
        mTabs.querySelectorAll('.m-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            activeView = btn.dataset.view;
            renderNav();
            renderMain();
            window.scrollTo(0, 0);
          });
        });
      }
    }

    // ── Data fetching ─────────────────────────────
    let landlordData = null;
    let tenantData = null;

    if (role === 'landlord') {
      try {
        const [rentalsRes, ytdRes] = await Promise.all([
          sb.from('rentals')
            .select('*, property:properties(*), tenant:profiles!rentals_tenant_id_fkey(full_name, phone, avatar_url)')
            .eq('landlord_id', user.id)
            .neq('status', 'ended')
            .order('created_at', { ascending: false })
            .limit(10),
          sb.from('rent_payments')
            .select('id, amount, month, status, rental_id, created_at, rental:rentals!inner(landlord_id, property:properties(name, city))')
            .eq('rental.landlord_id', user.id)
            .gte('month', `${now.getFullYear()}-01`)
            .order('created_at', { ascending: false })
        ]);

        const rentals = rentalsRes.data || [];
        const rentalIds = rentals.map(r => r.id);
        $('side-meta').textContent = `${rentals.length} propert${rentals.length === 1 ? 'y' : 'ies'}`;

        let currentPayments = [], recentRepairs = [];
        if (rentalIds.length) {
          const [pmtRes, repRes] = await Promise.all([
            sb.from('rent_payments')
              .select('*')
              .in('rental_id', rentalIds)
              .eq('month', currentMonth),
            sb.from('repair_requests')
              .select('*, rental:rentals(property:properties(name, city))')
              .in('rental_id', rentalIds)
              .order('created_at', { ascending: false })
              .limit(5),
          ]);
          currentPayments = pmtRes.data || [];
          recentRepairs = repRes.data || [];
        }

        const ytdPayments = (ytdRes.data || []).filter(p => p.status === 'paid');
        const ytdTotal = ytdPayments.reduce((s, p) => s + Number(p.amount), 0);
        const activeRentals = rentals.filter(r => r.status === 'active');
        const totalMonthlyRent = activeRentals.reduce((s, r) => s + Number(r.monthly_rent), 0);
        const paidThisMonth = currentPayments.filter(p => p.status === 'paid').reduce((s, p) => s + Number(p.amount), 0);
        const dueThisMonth = currentPayments.filter(p => p.status !== 'paid').reduce((s, p) => s + Number(p.amount), 0);
        const onTimeCount = currentPayments.filter(p => p.status === 'paid').length;
        const collectionRate = totalMonthlyRent > 0 ? Math.round((paidThisMonth / totalMonthlyRent) * 100) : 0;
        const score = Math.min(900, Math.round(600 + (collectionRate / 100) * 180 + (rentals.length > 0 ? 20 : 0)));

        // Build ledger from ytdPayments + recentRepairs
        const ledgerEntries = [
          ...ytdPayments.slice(0, 6).map(p => ({
            d: relDate(p.created_at),
            t: `Rent · ${p.rental?.property?.name || 'Property'}`,
            who: p.rental?.property?.city || '',
            amt: Number(p.amount),
            st: 'in'
          })),
          ...recentRepairs.slice(0, 3).filter(r => r.cost).map(r => ({
            d: relDate(r.created_at),
            t: `Repair · ${r.title || 'Repair request'}`,
            who: r.rental?.property?.name || '',
            amt: -(Number(r.cost || 0)),
            st: 'out'
          })),
        ].sort((a, b) => 0).slice(0, 8);

        landlordData = {
          rentals, currentPayments, ytdTotal, totalMonthlyRent,
          paidThisMonth, dueThisMonth, onTimeCount, activeRentals,
          collectionRate, score, ledgerEntries, recentRepairs, ytdPayments
        };
      } catch (e) {
        console.error('Landlord data error:', e);
        landlordData = { error: true };
      }
    } else if (role === 'tenant') {
      try {
        const { data: rental } = await sb.from('rentals')
          .select('*, property:properties(*), landlord:profiles!rentals_landlord_id_fkey(full_name, avatar_url)')
          .eq('tenant_id', user.id)
          .neq('status', 'ended')
          .order('created_at', { ascending: false })
          .limit(1)
          .maybeSingle();

        $('side-meta').textContent = rental?.property?.city ? `Tenant · ${rental.property.city}` : 'Tenant';

        let currentPayment = null, recentPayments = [], openRepairs = [], proofs = [];
        if (rental) {
          const [pmtRes, histRes, repRes, proofRes] = await Promise.all([
            sb.from('rent_payments').select('*').eq('rental_id', rental.id).eq('month', currentMonth).maybeSingle(),
            sb.from('rent_payments').select('*').eq('rental_id', rental.id).eq('status', 'paid').order('month', { ascending: false }).limit(6),
            sb.from('repair_requests').select('*').eq('rental_id', rental.id).in('status', ['open', 'in_progress']).order('created_at', { ascending: false }).limit(5),
            sb.from('proofs').select('*, proof_photos(id, room_label)').eq('rental_id', rental.id).eq('type', 'move_in').maybeSingle(),
          ]);
          currentPayment = pmtRes.data;
          recentPayments = histRes.data || [];
          openRepairs = repRes.data || [];
          proofs = proofRes.data;
        }

        const ytdTotal = recentPayments.reduce((s, p) => s + Number(p.amount), 0);
        const score = Math.min(900, Math.round(700 + (recentPayments.length > 0 ? Math.min(150, recentPayments.length * 12) : 0)));

        // Next due date calculation
        let nextDueDate = null;
        if (rental?.rent_due_day) {
          const d = new Date(now);
          d.setDate(rental.rent_due_day);
          if (d <= now) d.setMonth(d.getMonth() + 1);
          nextDueDate = d;
        }

        tenantData = { rental, currentPayment, recentPayments, openRepairs, proofs, ytdTotal, score, nextDueDate };
      } catch (e) {
        console.error('Tenant data error:', e);
        tenantData = { error: true };
      }
    } else {
      $('side-meta').textContent = 'Setup pending';
    }

    // ── Render functions ──────────────────────────
    function renderMain() {
      if (!role) {
        renderNoRole();
      } else if (role === 'landlord') {
        renderLandlordView();
      } else {
        renderTenantView();
      }
    }

    function renderNoRole() {
      $('main-content').innerHTML = `
        <div class="d-top">
          <div>
            <div class="eyebrow">Your account</div>
            <h1 class="d-h1">Welcome, ${firstName}.</h1>
            <p class="d-sub">Complete your profile setup to get started.</p>
          </div>
        </div>
        <div class="d-onboard">
          <div class="eyebrow" style="color:rgba(246,244,238,.6)">Get started</div>
          <h2>Set up your account.</h2>
          <p>Open the RentyBase mobile app to choose your role and complete setup. Once done, your full dashboard will appear here.</p>
          <div class="d-onboard-cta">
            <a href="/" class="btn btn-onboard">← Back to home</a>
          </div>
        </div>`;
    }

    function renderLandlordView() {
      if (!landlordData || landlordData.error || landlordData.rentals.length === 0) {
        renderLandlordEmpty();
        return;
      }
      switch(activeView) {
        case 'props': return renderLandlordProperties();
        case 'led': return renderLandlordLedger();
        case 'hra': return renderLandlordHRA();
        case 'rep': return renderLandlordRepairs();
        default: return renderLandlordHome();
      }
    }

    function renderLandlordEmpty() {
      $('main-content').innerHTML = `
        <div class="d-top">
          <div>
            <div class="eyebrow">Landlord · Overview</div>
            <h1 class="d-h1">Good to see you, ${firstName}.</h1>
            <p class="d-sub">Your landlord dashboard is ready. Add your first property to get started.</p>
          </div>
        </div>
        <div class="d-onboard">
          <div class="eyebrow" style="color:rgba(246,244,238,.6)">No properties yet</div>
          <h2>Add your first property.</h2>
          <p>Create a property, set rent terms, and share the invite link with your tenant — all right here.</p>
          <div class="d-onboard-cta">
            <button class="btn btn-primary" onclick="openAddProperty()">+ Add property →</button>
            <a href="/" class="btn btn-onboard">← Back to home</a>
          </div>
        </div>`;
    }

    function renderLandlordHome() {
      const { rentals, currentPayments, ytdTotal, totalMonthlyRent, paidThisMonth, dueThisMonth,
              onTimeCount, activeRentals, collectionRate, score, ledgerEntries, recentRepairs } = landlordData;
      const band = scoreBand(score);
      const pct = totalMonthlyRent > 0 ? Math.min(100, Math.round(paidThisMonth / totalMonthlyRent * 100)) : 0;
      const openRepairs = recentRepairs.filter(r => r.status === 'open' || r.status === 'in_progress');

      $('main-content').innerHTML = `
        <div class="d-top">
          <div>
            <div class="eyebrow">Landlord · Overview</div>
            <h1 class="d-h1">Good to see you, ${firstName}.</h1>
            <p class="d-sub">
              You have <b>${activeRentals.length} active ${activeRentals.length === 1 ? 'property' : 'properties'}</b>
              ${dueThisMonth > 0 ? ` — <b>${inr(dueThisMonth)} pending</b> this month` : ' — <b>all collections up to date</b>'}.
              Score <b>${score} / 900</b>.
            </p>
          </div>
        </div>
        <div class="d-grid">
          <!-- Hero stats -->
          <section class="card d-hero-card">
            <div class="d-hero-meta">COLLECTED · ${monthLabel(currentMonth).toUpperCase()}</div>
            <div class="d-hero-num">${inr(paidThisMonth)} <span class="d-of">/ ${inr(totalMonthlyRent)}</span></div>
            <div class="d-bar"><div class="d-bar-f" style="width:${pct}%"></div></div>
            <div class="d-hero-row">
              <div><div class="d-stat-l">On time</div><div class="d-stat-v">${onTimeCount} / ${activeRentals.length}</div></div>
              <div><div class="d-stat-l">Pending</div><div class="d-stat-v ochre">${dueThisMonth > 0 ? inr(dueThisMonth) : '—'}</div></div>
              <div><div class="d-stat-l">YTD income</div><div class="d-stat-v">${ytdTotal > 100000 ? (ytdTotal/100000).toFixed(1)+'L' : inr(ytdTotal)}</div></div>
              <div><div class="d-stat-l">Score</div><div class="d-stat-v">${score}<span class="d-stat-of">/900</span></div></div>
            </div>
          </section>

          <!-- Score card -->
          <section class="card d-score">
            <div class="d-score-tag">Landlord score</div>
            <div class="d-score-num">${score}</div>

    // ── Component helpers ─────────────────────────
    function propRow(r, currentPayments, i = 0) {
      const pmt = currentPayments.find(p => p.rental_id === r.id);
      const isPaid = pmt?.status === 'paid';
      const isPending = pmt?.status === 'pending_verification';
      const noPmt = !pmt;
      const pillCls = isPaid ? 'paid' : isPending ? 'pending' : noPmt ? 'none' : 'due';
      const pillLabel = isPaid ? `Paid · ${monthLabel(currentMonth)}` : isPending ? 'Pending verify' : noPmt ? 'No payment yet' : 'Due this month';
      const propName = r.property?.name || `Property ${i + 1}`;
      const city = r.property?.city || '';
      const noTenant = r.status === 'pending_tenant' || !r.tenant_id;
      const tenantName = r.tenant?.full_name || (noTenant ? 'Awaiting tenant' : 'No tenant');
      const tone = THUMB_COLORS[i % THUMB_COLORS.length];
      const invToken = (r.invite_token || '').replace(/'/g, '');
      // Action row spans all 3 grid columns using grid-column:1/-1
      let actionHtml = '';
      if (noTenant && invToken) {
        actionHtml = `<div style="grid-column:1/-1;padding-top:8px;border-top:1px solid var(--rb-border-soft);display:flex;gap:8px"><button class="act-btn accent" onclick="event.stopPropagation();showInviteLink('${r.id}','${invToken}')">Share invite link</button></div>`;
      } else if (isPending && pmt?.id) {
        actionHtml = `<div style="grid-column:1/-1;padding-top:8px;border-top:1px solid var(--rb-border-soft);display:flex;gap:8px"><button class="act-btn success" onclick="event.stopPropagation();confirmPayment('${pmt.id}')">✓ Confirm receipt</button><button class="act-btn ghost" onclick="event.stopPropagation();rejectPayment('${pmt.id}')">Reject</button></div>`;
      } else if (!isPaid && !noPmt && pmt?.id) {
        actionHtml = `<div style="grid-column:1/-1;padding-top:8px;border-top:1px solid var(--rb-border-soft);display:flex;gap:8px"><button class="act-btn success" onclick="event.stopPropagation();confirmPayment('${pmt.id}')">✓ Mark as paid</button></div>`;
      }
      return `
        <div class="d-prop" onclick="openPropertyDetail('${r.id}')" style="cursor:pointer">
          <div class="d-prop-thumb" style="background:linear-gradient(135deg,${tone},#2c1c0e)"></div>
          <div class="d-prop-body">
            <div class="d-prop-city">${city}</div>
            <div class="d-prop-addr">${propName}</div>
            <div class="d-prop-tenant">Tenant · ${tenantName}</div>
          </div>
          <div class="d-prop-r">
            <div class="d-prop-rent">${inr(r.monthly_rent)}<span>/mo</span></div>
            <div class="d-prop-pill ${pillCls}">${pillLabel}</div>
          </div>
          ${actionHtml}
        </div>`;
    }

    function repairRow(r, isLandlord = false) {
      const stMap = { open: 'open', in_progress: 'progress', resolved: 'done' };
      const dotCls = stMap[r.status] || 'done';
      const stLabelMap = { open: 'OPEN', in_progress: 'IN PROGRESS', resolved: 'RESOLVED' };
      const stPillMap = { open: 'open', in_progress: 'in', resolved: 'done' };
      const stLabel = stLabelMap[r.status] || r.status;
      const stPill = stPillMap[r.status] || 'done';
      const propName = r.rental?.property?.name || '';
      let btns = '';
      if (isLandlord && r.status === 'open') {
        btns = `<button class="act-btn ghost" onclick="updateRepairStatus('${r.id}','in_progress')">Start work</button><button class="act-btn success" onclick="updateRepairStatus('${r.id}','resolved')">Mark resolved</button>`;
      } else if (isLandlord && r.status === 'in_progress') {
        btns = `<button class="act-btn success" onclick="updateRepairStatus('${r.id}','resolved')">✓ Mark resolved</button>`;
      }
      return `
        <div class="d-req">
          <div class="d-req-dot ${dotCls}"></div>
          <div class="d-req-body">
            <div class="d-req-t">${r.title || 'Repair request'}</div>
            <div class="d-req-m">${r.description ? r.description.slice(0, 80) + (r.description.length > 80 ? '…' : '') : ''} ${propName ? '· ' + propName : ''} · ${relDate(r.created_at)}</div>
          </div>
          <div class="d-req-st ${stPill}">${stLabel}</div>
          ${btns ? `<div style="grid-column:1/-1;display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--rb-border-soft)">${btns}</div>` : ''}
        </div>`;
    }

    function ordSuffix(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return s[(v - 20) % 10] || s[v] || s[0];
    }

    // ── Modal helpers ─────────────────────────────
    function showModal(html, onSubmit) {
      const bg = $('modal-bg');
      const inner = $('modal-inner');
      inner.innerHTML = html;
      bg.style.display = 'grid';
      inner.querySelector('.modal-close')?.addEventListener('click', closeModal);
      const form = inner.querySelector('form');
      if (form && onSubmit) {
        form.addEventListener('submit', async e => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(form));
          const btn = form.querySelector('[type=submit]');
          const orig = btn.textContent;
          btn.disabled = true; btn.textContent = 'Saving…';
          try { await onSubmit(data); closeModal(); }
          catch (err) { btn.disabled = false; btn.textContent = orig; showToast(err.message || 'Error saving', 'error'); }
        });
      }
    }
    function closeModal() { $('modal-bg').style.display = 'none'; }

    // ── Toast helper ──────────────────────────────
    function showToast(msg, type = '') {
      const wrap = $('toast-wrap');
      const t = document.createElement('div');
      t.className = 'toast' + (type ? ' ' + type : '');
      t.textContent = msg;
      wrap.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 320); }, 3000);
    }

    // ── Landlord: Add property ────────────────────
    function openAddProperty() {
      showModal(`
        <button class="modal-close" type="button">×</button>
        <h2>Add property</h2>
        <form>
          <div class="field"><label>Property name / unit</label><input name="name" placeholder="e.g. Sunrise Apt 3B" required autocomplete="off"/></div>
          <div class="field"><label>Street address</label><input name="address" placeholder="e.g. 42, Park Road, Banjara Hills" autocomplete="off"/></div>
          <div class="field-row">
            <div class="field"><label>City</label><input name="city" placeholder="Hyderabad" required autocomplete="off"/></div>
            <div class="field"><label>Pincode</label><input name="pincode" placeholder="500001" autocomplete="off" inputmode="numeric" maxlength="6"/></div>
          </div>
          <div class="field-row">
            <div class="field"><label>State</label><input name="state" placeholder="Telangana" autocomplete="off"/></div>
            <div class="field"><label>Property type</label>
              <select name="property_type">
                <option value="apartment">Apartment / Flat</option>
                <option value="house">Independent House</option>
                <option value="pg">PG / Hostel</option>
                <option value="villa">Villa / Row-house</option>
                <option value="commercial">Commercial space</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>Monthly rent (₹)</label><input name="monthly_rent" type="number" min="1" placeholder="15000" required inputmode="numeric"/></div>
            <div class="field"><label>Security deposit (₹)</label><input name="security_deposit" type="number" min="0" placeholder="30000" value="0" inputmode="numeric"/></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Rent due day (1–28)</label><input name="rent_due_day" type="number" min="1" max="28" placeholder="1" value="1" required inputmode="numeric"/></div>
            <div class="field"><label>Total rooms / beds</label><input name="total_rooms" type="number" min="1" placeholder="1" inputmode="numeric"/></div>
          </div>
          <div class="modal-foot">
            <button type="button" class="act-btn ghost" onclick="closeModal()">Cancel</button>
            <button type="submit" class="act-btn primary">Add property →</button>
          </div>
        </form>`, async data => {
        const { data: prop, error: pErr } = await sb.from('properties').insert({
          landlord_id: user.id,
          name: data.name,
          address: data.address || null,
          city: data.city,
          state: data.state || null,
          pincode: data.pincode || null,
          property_type: data.property_type,
          total_rooms: data.total_rooms ? Number(data.total_rooms) : null,
        }).select().single();
        if (pErr) throw pErr;
        const token = crypto.randomUUID();
        const exp = new Date(Date.now() + 72 * 3600000).toISOString();
        const { error: rErr } = await sb.from('rentals').insert({
          landlord_id: user.id,
          property_id: prop.id,
          monthly_rent: Number(data.monthly_rent),
          security_deposit: Number(data.security_deposit || 0),
          rent_due_day: Number(data.rent_due_day || 1),
          status: 'pending_tenant',
          invite_token: token,
          invite_expires_at: exp,
        });
        if (rErr) throw rErr;
        showToast('Property added! Share the invite link with your tenant.', 'success');
        setTimeout(() => location.reload(), 1200);
      });
    }

    // ── Landlord: Show invite link ────────────────
    function showInviteLink(rentalId, token) {
      if (!token) { showToast('No invite token found.', 'error'); return; }
      const link = `https://rentybase.com/join/${token}`;
      showModal(`
        <button class="modal-close" type="button">×</button>
        <h2>Invite tenant</h2>
        <p style="color:var(--rb-ink-3);font-size:14px;line-height:1.55;margin-bottom:16px">Share this link with your tenant. Expires in 72 hours from when the property was created.</p>
        <div style="background:var(--rb-fill);border-radius:10px;padding:14px;font-family:var(--rb-font-mono);font-size:12px;word-break:break-all;color:var(--rb-ink);user-select:all">${link}</div>
        <div class="modal-foot">
          <button type="button" class="act-btn ghost" onclick="closeModal()">Close</button>
          <button type="button" class="act-btn primary" onclick="navigator.clipboard.writeText('${link}').then(()=>showToast('Link copied!','success'))">Copy link</button>
        </div>`);
    }

    // ── Landlord: Confirm / reject payment ────────
    async function confirmPayment(paymentId) {
      if (!confirm('Confirm this rent payment as received?')) return;
      const { error } = await sb.from('rent_payments').update({ status: 'paid' }).eq('id', paymentId);
      if (error) { showToast(error.message, 'error'); return; }
      showToast('Payment confirmed!', 'success');
      setTimeout(() => location.reload(), 1200);
    }
    async function rejectPayment(paymentId) {
      if (!confirm('Reject this payment submission? Tenant will need to resubmit.')) return;
      const { error } = await sb.from('rent_payments').update({ status: 'pending', utr_number: null, payment_note: null }).eq('id', paymentId);
      if (error) { showToast(error.message, 'error'); return; }
      showToast('Payment rejected — tenant notified.', 'success');
      setTimeout(() => location.reload(), 1200);
    }

    // ── Landlord: Update repair status ────────────
    async function updateRepairStatus(repairId, newStatus) {
      const labels = { in_progress: 'In Progress', resolved: 'Resolved' };
      if (!confirm(`Mark this repair as ${labels[newStatus] || newStatus}?`)) return;
      const { error } = await sb.from('repair_requests').update({ status: newStatus }).eq('id', repairId);
      if (error) { showToast(error.message, 'error'); return; }
      showToast('Repair updated!', 'success');
      setTimeout(() => location.reload(), 1200);
    }

    // ── Tenant: Submit rent payment ───────────────
    function openPayRent(rentalId, paymentId, amount) {
      showModal(`
        <button class="modal-close" type="button">×</button>
        <h2>Record payment</h2>
        <div style="background:var(--rb-action-soft);border-radius:12px;padding:14px 16px;margin-bottom:18px">
          <div style="font-size:11px;font-weight:700;color:var(--rb-action);letter-spacing:.1em">AMOUNT</div>
          <div style="font-family:var(--rb-font-display);font-size:32px;color:var(--rb-action);letter-spacing:-.02em;margin-top:2px">${inr(amount)}</div>
        </div>
        <form>
          <div class="field"><label>Payment method</label>
            <select name="payment_method">
              <option value="upi">UPI (GPay, PhonePe, Paytm…)</option>
              <option value="bank_transfer">Bank Transfer / NEFT / IMPS</option>
              <option value="cheque">Cheque</option>
              <option value="cash">Cash</option>
            </select>
          </div>
          <div class="field"><label>UTR / Transaction reference</label><input name="utr_number" placeholder="e.g. T2605131234567890" autocomplete="off"/></div>
          <div class="field"><label>Note to landlord (optional)</label><textarea name="payment_note" placeholder="Paid via Google Pay to 9876543210@upi…"></textarea></div>
          <div class="modal-foot">
            <button type="button" class="act-btn ghost" onclick="closeModal()">Cancel</button>
            <button type="submit" class="act-btn primary">Submit payment →</button>
          </div>
        </form>`, async data => {
        const upd = { status: 'pending_verification', payment_method: data.payment_method, utr_number: data.utr_number || null, payment_note: data.payment_note || null };
        let error;
        if (paymentId) {
          ({ error } = await sb.from('rent_payments').update(upd).eq('id', paymentId));
        } else {
          ({ error } = await sb.from('rent_payments').insert({ rental_id: rentalId, month: currentMonth, amount: amount, ...upd }));
        }
        if (error) throw error;
        showToast('Payment submitted! Awaiting landlord confirmation.', 'success');
        setTimeout(() => location.reload(), 1200);
      });
    }

    // ── Tenant: Raise repair request ──────────────
    function openRaiseRepair(rentalId) {
      showModal(`
        <button class="modal-close" type="button">×</button>
        <h2>Raise repair request</h2>
        <form>
          <div class="field"><label>Issue title</label><input name="title" placeholder="e.g. Leaking tap in bathroom" required autocomplete="off"/></div>
          <div class="field"><label>Description</label><textarea name="description" placeholder="Describe the issue — location, when it started, how severe…" required></textarea></div>
          <div class="modal-foot">
            <button type="button" class="act-btn ghost" onclick="closeModal()">Cancel</button>
            <button type="submit" class="act-btn accent">Submit request →</button>
          </div>
        </form>`, async data => {
        const { error } = await sb.from('repair_requests').insert({ rental_id: rentalId, title: data.title, description: data.description, status: 'open' });
        if (error) throw error;
        showToast('Repair request submitted!', 'success');
        setTimeout(() => location.reload(), 1200);
      });
    }

    // ── Landlord: Property detail / edit / delete ─
    function openPropertyDetail(rentalId) {
      const { rentals, currentPayments } = landlordData || {};
      if (!rentals) return;
      const r = rentals.find(x => x.id === rentalId);
      if (!r) return;
      const prop = r.property || {};
      const idx = rentals.indexOf(r);
      const tone = THUMB_COLORS[idx % THUMB_COLORS.length];
      const noTenant = r.status === 'pending_tenant' || !r.tenant_id;
      const tenantName = r.tenant?.full_name || (noTenant ? 'No tenant yet' : '–');
      const invToken = (r.invite_token || '').replace(/'/g, '');
      const pmt = (currentPayments || []).find(p => p.rental_id === r.id);
      const pmtLabel = pmt ? (pmt.status === 'paid' ? 'Paid this month' : pmt.status === 'pending_verification' ? 'Pending verification' : 'Due this month') : 'No payment this month';
      const addrParts = [prop.address, prop.city, prop.state, prop.pincode].filter(Boolean);
      showModal(`
        <button class="modal-close" type="button">×</button>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
          <div style="width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,${tone},#2c1c0e);flex-shrink:0"></div>
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--rb-ink-3);letter-spacing:.1em;text-transform:uppercase">${prop.city || ''}</div>
            <div style="font-family:var(--rb-font-display);font-size:22px;font-weight:400;line-height:1.2;letter-spacing:-.01em">${prop.name || 'Property'}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--rb-fill);border-radius:10px;padding:12px">
            <div style="font-size:10px;font-weight:700;color:var(--rb-ink-3);letter-spacing:.1em;margin-bottom:4px">RENT</div>
            <div style="font-size:20px;font-weight:600;letter-spacing:-.02em">${inr(r.monthly_rent)}<span style="font-size:11px;font-weight:400;color:var(--rb-ink-3)">/mo</span></div>
          </div>
          <div style="background:var(--rb-fill);border-radius:10px;padding:12px">
            <div style="font-size:10px;font-weight:700;color:var(--rb-ink-3);letter-spacing:.1em;margin-bottom:4px">DEPOSIT</div>
            <div style="font-size:20px;font-weight:600;letter-spacing:-.02em">${inr(r.security_deposit)}</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--rb-ink-3);line-height:1.8;margin-bottom:18px">
          ${addrParts.length ? `<div>📍 ${addrParts.join(', ')}</div>` : ''}
          <div>🏠 ${(prop.property_type||'property').charAt(0).toUpperCase()+(prop.property_type||'property').slice(1).replace('_',' ')} · Due ${r.rent_due_day}${ordSuffix(r.rent_due_day)} of each month</div>
          <div>👤 Tenant: ${tenantName}</div>
          <div>💳 ${pmtLabel}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${noTenant && invToken ? `<button type="button" class="act-btn accent" onclick="closeModal();setTimeout(()=>showInviteLink('${r.id}','${invToken}'),100)">🔗 Share invite link</button>` : ''}
          <div style="display:flex;gap:8px">
            <button type="button" class="act-btn ghost" style="flex:1" onclick="openEditProperty('${r.id}')">Edit</button>
            <button type="button" class="act-btn danger" style="flex:1" onclick="deleteProperty('${r.id}','${prop.id||''}')">Delete</button>
          </div>
          <button type="button" class="act-btn ghost" style="width:100%;justify-content:center" onclick="closeModal()">Close</button>
        </div>`);
    }

    function openEditProperty(rentalId) {
      const r = (landlordData?.rentals || []).find(x => x.id === rentalId);
      if (!r) return;
      const prop = r.property || {};
      showModal(`
        <button class="modal-close" type="button">×</button>
        <h2>Edit property</h2>
        <form>
          <div class="field"><label>Property name / unit</label><input name="name" value="${(prop.name||'').replace(/"/g,'&quot;')}" required autocomplete="off"/></div>
          <div class="field"><label>Street address</label><input name="address" value="${(prop.address||'').replace(/"/g,'&quot;')}" placeholder="42, Park Road…" autocomplete="off"/></div>
          <div class="field-row">
            <div class="field"><label>City</label><input name="city" value="${(prop.city||'').replace(/"/g,'&quot;')}" required autocomplete="off"/></div>
            <div class="field"><label>Pincode</label><input name="pincode" value="${(prop.pincode||'').replace(/"/g,'&quot;')}" placeholder="500001" inputmode="numeric" maxlength="6"/></div>
          </div>
          <div class="field-row">
            <div class="field"><label>State</label><input name="state" value="${(prop.state||'').replace(/"/g,'&quot;')}" placeholder="Telangana" autocomplete="off"/></div>
            <div class="field"><label>Property type</label>
              <select name="property_type">
                <option value="apartment" ${prop.property_type==='apartment'?'selected':''}>Apartment / Flat</option>
                <option value="house" ${prop.property_type==='house'?'selected':''}>Independent House</option>
                <option value="pg" ${prop.property_type==='pg'?'selected':''}>PG / Hostel</option>
                <option value="villa" ${prop.property_type==='villa'?'selected':''}>Villa / Row-house</option>
                <option value="commercial" ${prop.property_type==='commercial'?'selected':''}>Commercial space</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>Monthly rent (₹)</label><input name="monthly_rent" type="number" min="1" value="${r.monthly_rent||''}" required inputmode="numeric"/></div>
            <div class="field"><label>Security deposit (₹)</label><input name="security_deposit" type="number" min="0" value="${r.security_deposit||0}" inputmode="numeric"/></div>
          </div>
          <div class="field"><label>Rent due day (1–28)</label><input name="rent_due_day" type="number" min="1" max="28" value="${r.rent_due_day||1}" required inputmode="numeric"/></div>
          <div class="modal-foot">
            <button type="button" class="act-btn ghost" onclick="closeModal()">Cancel</button>
            <button type="submit" class="act-btn primary">Save changes →</button>
          </div>
        </form>`, async data => {
        const propId = prop.id;
        if (propId) {
          const { error: pErr } = await sb.from('properties').update({
            name: data.name, address: data.address || null, city: data.city,
            state: data.state || null, pincode: data.pincode || null, property_type: data.property_type,
          }).eq('id', propId);
          if (pErr) throw pErr;
        }
        const { error: rErr } = await sb.from('rentals').update({
          monthly_rent: Number(data.monthly_rent),
          security_deposit: Number(data.security_deposit || 0),
          rent_due_day: Number(data.rent_due_day || 1),
        }).eq('id', rentalId);
        if (rErr) throw rErr;
        showToast('Property updated!', 'success');
        setTimeout(() => location.reload(), 1200);
      });
    }

    async function deleteProperty(rentalId, propertyId) {
      if (!confirm('Delete this property and its rental record? This cannot be undone.')) return;
      const { error: rErr } = await sb.from('rentals').delete().eq('id', rentalId);
      if (rErr) { showToast(rErr.message, 'error'); return; }
      if (propertyId) {
        await sb.from('properties').delete().eq('id', propertyId);
      }
      showToast('Property deleted.', 'success');
      setTimeout(() => location.reload(), 1200);
    }

    // Expose onclick-referenced functions to global scope (they live inside the IIFE)
    Object.assign(window, {
      openAddProperty, showInviteLink, confirmPayment, rejectPayment,
      updateRepairStatus, openPayRent, openRaiseRepair, closeModal, showToast,
      openPropertyDetail, openEditProperty, deleteProperty,
    });

    // ── Init ──────────────────────────────────────
    renderNav();
    renderMain();
    show('app-shell');
  })();
  </script>
</body>
</html>
