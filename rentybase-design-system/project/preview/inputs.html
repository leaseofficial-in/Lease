<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:24px;color:var(--rb-ink)}
  .col{display:flex;flex-direction:column;gap:12px;max-width:380px}
  .field{display:flex;flex-direction:column;gap:6px}
  .lab{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8E948D}
  .input{display:flex;align-items:center;gap:8px;background:#F0EFE9;border:1px solid #E6E2D7;border-radius:14px;padding:12px 14px;min-height:48px}
  .input.focus{background:#fff;border-color:#0F4C5C;box-shadow:0 0 0 3px rgba(15,76,92,.18)}
  .input.error{border-color:#B33A2E}
  .input input{border:none;background:transparent;outline:none;font-size:15px;flex:1;font-family:inherit;color:#0E1413}
  .err{font-size:12px;color:#B33A2E}
</style></head><body>
<div class="col">
  <div class="field">
    <span class="lab">Property name</span>
    <div class="input"><input value="Bandra 2BHK" /></div>
  </div>
  <div class="field">
    <span class="lab">Monthly rent (₹)</span>
    <div class="input focus"><input value="62000" style="font-family:'JetBrains Mono',monospace" /></div>
  </div>
  <div class="field">
    <span class="lab">PAN number</span>
    <div class="input error"><input value="ABCD1" /></div>
    <span class="err">PAN must be 10 characters.</span>
  </div>
</div>
</body></html>
