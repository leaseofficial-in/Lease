<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:20px;color:var(--rb-ink)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--rb-border-soft)}
  .stop{height:96px;display:flex;align-items:flex-end;padding:10px;font-family:var(--rb-font-mono);font-size:10px}
  .label{font-size:11px;color:var(--rb-ink-3);margin-top:8px;letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="label">Neutral scale · 6 stops</div>
<div class="row" style="margin-top:8px">
  <div class="stop" style="background:#FFFFFF;color:#0E1413;border-right:1px solid var(--rb-border-soft)">#FFFFFF</div>
  <div class="stop" style="background:#F6F4EE;color:#0E1413">#F6F4EE</div>
  <div class="stop" style="background:#E6E2D7;color:#0E1413">#E6E2D7</div>
  <div class="stop" style="background:#B5B1A4;color:#0E1413">#B5B1A4</div>
  <div class="stop" style="background:#5C645F;color:#fff">#5C645F</div>
  <div class="stop" style="background:#0E1413;color:#fff">#0E1413</div>
</div>
</body></html>
