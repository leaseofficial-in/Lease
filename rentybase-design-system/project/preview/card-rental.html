<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:24px;color:var(--rb-ink)}
  .card{background:#fff;border:1px solid #EBE7DB;border-radius:18px;padding:18px;box-shadow:0 1px 2px rgba(20,18,12,.04),0 2px 8px rgba(20,18,12,.05);max-width:340px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#5C645F;font-weight:600}
  .title{font-size:18px;font-weight:600;margin-top:4px}
  .addr{font-size:13px;color:#5C645F;margin-top:2px}
  .pill{padding:5px 11px;border-radius:999px;font-size:11px;font-weight:600;background:#DEEFE6;color:#1F7A55}
  .metrics{display:flex;justify-content:space-between;border-top:1px solid #EBE7DB;padding-top:14px}
  .m-lab{font-size:11px;color:#5C645F;font-weight:500}
  .m-val{font-size:14px;font-weight:600;margin-top:2px;font-family:'JetBrains Mono',monospace}
</style></head><body>
<div class="card">
  <div class="top">
    <div>
      <div class="eyebrow">Mumbai</div>
      <div class="title">Bandra 2BHK</div>
      <div class="addr">12, Linking Rd, Bandra West</div>
    </div>
    <span class="pill">Active</span>
  </div>
  <div class="metrics">
    <div><div class="m-lab">Rent</div><div class="m-val">₹62K/mo</div></div>
    <div><div class="m-lab">Deposit</div><div class="m-val">₹1.8L</div></div>
    <div style="text-align:right"><div class="m-lab">Since</div><div class="m-val" style="font-family:var(--rb-font-sans);font-weight:500">5 Nov 2024</div></div>
  </div>
</div>
</body></html>
