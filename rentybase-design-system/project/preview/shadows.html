<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:24px;color:var(--rb-ink)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .demo{background:#fff;height:100px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--rb-ink-3);font-family:'JetBrains Mono',monospace}
  .sm{box-shadow:0 1px 2px rgba(20,18,12,.04),0 2px 8px rgba(20,18,12,.05)}
  .md{box-shadow:0 4px 12px rgba(20,18,12,.06),0 12px 32px rgba(20,18,12,.08)}
  .lg{box-shadow:0 -4px 16px rgba(20,18,12,.04),0 24px 64px rgba(20,18,12,.18)}
</style></head><body>
<div class="row">
  <div class="demo sm">shadow-sm · resting</div>
  <div class="demo md">shadow-md · hover</div>
  <div class="demo lg">shadow-lg · modal</div>
</div>
</body></html>
