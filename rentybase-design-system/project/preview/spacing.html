<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:20px;color:var(--rb-ink)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .cell{background:#fff;border:1px solid var(--rb-border-soft);border-radius:8px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#0F4C5C}
  .lab{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rb-ink-3)}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><span class="lab">4 · space-1</span></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><span class="lab">8 · space-2</span></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><span class="lab">12 · space-3</span></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><span class="lab">16 · space-4</span></div>
  <div class="cell"><div class="box" style="width:20px;height:20px"></div><span class="lab">20 · space-5</span></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><span class="lab">24 · space-6</span></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><span class="lab">32 · space-8</span></div>
  <div class="cell"><div class="box" style="width:40px;height:40px"></div><span class="lab">40 · space-10</span></div>
  <div class="cell"><div class="box" style="width:56px;height:56px"></div><span class="lab">56 · space-14</span></div>
  <div class="cell"><div class="box" style="width:80px;height:80px"></div><span class="lab">80 · space-20</span></div>
</div>
</body></html>
