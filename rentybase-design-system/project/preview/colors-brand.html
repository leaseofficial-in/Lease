<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:20px;color:var(--rb-ink)}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border:1px solid var(--rb-border-soft);border-radius:14px;background:#fff;overflow:hidden}
  .chip{height:80px}
  .meta{padding:10px 12px}
  .name{font-size:13px;font-weight:600;color:var(--rb-ink)}
  .hex{font-family:var(--rb-font-mono);font-size:11px;color:var(--rb-ink-3);margin-top:2px}
</style></head><body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#0F4C5C"></div><div class="meta"><div class="name">Action / Trust Teal</div><div class="hex">#0F4C5C · 9.2:1 AAA</div></div></div>
  <div class="sw"><div class="chip" style="background:#0E1413"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0E1413 · 16.9:1 AAA</div></div></div>
  <div class="sw"><div class="chip" style="background:#C97A3A"></div><div class="meta"><div class="name">Seal Ochre</div><div class="hex">#C97A3A · accent only</div></div></div>
  <div class="sw"><div class="chip" style="background:#F6F4EE;border-bottom:1px solid var(--rb-border-soft)"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#F6F4EE · app bg</div></div></div>
</div>
</body></html>
