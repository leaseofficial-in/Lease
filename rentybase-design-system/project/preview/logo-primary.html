<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0E1413;--copper:#C97A3A;--canvas:#F6F4EE;--muted:#5C645F;--teal:#0F4C5C}
  body{margin:0;background:var(--canvas);font-family:'Bricolage Grotesque',sans-serif;padding:32px;color:var(--ink);display:flex;gap:26px;align-items:center}
  .tile{
    width:104px;height:104px;border-radius:26px;background:#0E1413;
    position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 0 0 1px rgba(255,255,255,.04),
      0 14px 40px -8px rgba(15,76,92,.45),
      0 2px 6px rgba(0,0,0,.25);
  }
  .tile::before{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 80% 12%, rgba(201,122,58,.55), transparent 55%),
               radial-gradient(circle at 12% 96%, rgba(15,76,92,.7), transparent 60%);}
  .tile svg{position:relative;z-index:1}

  .lockup{display:flex;flex-direction:column;gap:10px}

  /* Wordmark — Bricolage condensed black, two-tone (Base in copper).
     No background pill. Subtle copper accent dot for ownable signature. */
  .word{
    font-family:'Bricolage Grotesque',sans-serif;
    font-variation-settings:"opsz" 96,"wdth" 75;
    font-weight:800;
    font-size:64px;line-height:.9;letter-spacing:-.06em;color:var(--ink);
    display:inline-flex;align-items:baseline;
  }
  .word .renty{color:var(--ink)}
  .word .base{color:var(--copper);margin-left:1px}
  .word .stop{
    display:inline-block;width:11px;height:11px;background:var(--copper);
    border-radius:2.5px;margin-left:6px;transform:translateY(-3px);
  }

  .tag{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);font-weight:500;
    display:flex;align-items:center;gap:8px;margin-top:4px;
  }
  .tag::before{content:"";width:18px;height:1px;background:var(--copper);display:inline-block}
</style></head>
<body>

<!-- Icon: clear pitched-roof house with a wide doorway opening containing
     the "RB" monogram. Roof reads unmistakably as a home; the door frames
     the brand. Copper threshold bar grounds the doorway. -->
<div class="tile" aria-label="RentyBase mark">
  <svg width="80" height="80" viewBox="0 0 200 200" fill="none">
    <!-- Classic pitched-roof house silhouette, symmetrical apex,
         rounded base. Drawn as one closed path. -->
    <path d="
      M100 22
      L176 88
      V162
      a14 14 0 0 1 -14 14
      H38
      a14 14 0 0 1 -14 -14
      V88
      Z
    " fill="#F6F4EE"/>

    <!-- Wide arched doorway carved out of the lower-center -->
    <path d="
      M62 178
      V128
      a38 38 0 0 1 76 0
      V178
      Z
    " fill="#0E1413"/>

    <!-- "RB" monogram inside the doorway, in the canvas color -->
    <text x="100" y="170"
          text-anchor="middle"
          font-family="'Bricolage Grotesque', system-ui, sans-serif"
          font-size="46"
          font-weight="800"
          letter-spacing="-3"
          fill="#F6F4EE"
          style="font-variation-settings:&quot;opsz&quot; 96, &quot;wdth&quot; 75;">RB</text>

    <!-- Copper threshold bar at base of doorway -->
    <rect x="60" y="172" width="80" height="6" rx="1" fill="#C97A3A"/>

    <!-- Tiny copper "porch light" on the roof apex - subtle brand spark -->
    <circle cx="100" cy="46" r="3.2" fill="#C97A3A"/>
  </svg>
</div>

<div class="lockup">
  <div class="word">
    <span class="renty">Renty</span><span class="base">Base</span><span class="stop"></span>
  </div>
  <span class="tag">The verified record of every rent</span>
</div>

</body></html>
