<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:20px;color:var(--rb-ink)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .demo{background:#fff;height:90px;border:1px solid var(--rb-border-soft);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;font-size:11px;color:var(--rb-ink-3)}
  .demo b{font-family:'JetBrains Mono',monospace;color:var(--rb-ink);font-weight:500;font-size:12px}
</style></head><body>
<div class="grid">
  <div class="demo" style="border-radius:8px"><b>8</b>tag · radius-sm</div>
  <div class="demo" style="border-radius:14px"><b>14</b>tile · radius-tile</div>
  <div class="demo" style="border-radius:18px"><b>18</b>card · radius-lg</div>
  <div class="demo" style="border-radius:22px"><b>22</b>hero · radius-xl</div>
</div>
</body></html>
