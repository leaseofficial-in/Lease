<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--rb-font-sans);padding:0;color:var(--rb-ink)}
  .hero{height:280px;background:linear-gradient(135deg,#0F4C5C 0%,#163A47 60%,#0E1413 100%);position:relative;overflow:hidden;display:flex;align-items:center;padding:32px;color:#fff}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 12%,rgba(201,122,58,.22),transparent 55%);pointer-events:none}
  h1{font-family:'Instrument Serif',serif;font-size:42px;line-height:1.04;letter-spacing:-.035em;font-weight:400;margin:0;max-width:60%;position:relative}
  h1 em{color:#C97A3A;font-style:italic}
  .lab{position:absolute;bottom:14px;left:32px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.5)}
</style></head><body>
<div class="hero">
  <h1>Rent that <em>trusts itself</em></h1>
  <span class="lab">brand gradient · hero only</span>
</div>
</body></html>
