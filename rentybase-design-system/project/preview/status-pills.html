<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:24px;color:var(--rb-ink)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:600}
  .dot{width:6px;height:6px;border-radius:50%}
</style></head><body>
<div class="row">
  <span class="pill" style="background:#DEEFE6;color:#1F7A55"><span class="dot" style="background:#1F7A55"></span>Paid</span>
  <span class="pill" style="background:#F6E6CA;color:#B8740F">Due</span>
  <span class="pill" style="background:#F3DAD6;color:#B33A2E">Overdue</span>
  <span class="pill" style="background:#DDE8EB;color:#0F4C5C">Awaiting tenant</span>
  <span class="pill" style="background:#F0EFE9;color:#5C645F">Ended</span>
  <span class="pill" style="background:#F4E5D4;color:#C97A3A">Verified</span>
</div>
<div class="row" style="margin-top:14px">
  <span class="pill" style="background:#fff;border:1px solid #E6E2D7;color:#0E1413">Active</span>
  <span class="pill" style="background:#fff;border:1px solid #E6E2D7;color:#5C645F">Move-out</span>
  <span class="pill" style="background:#fff;border:1px solid #E6E2D7;color:#0E1413">PG / Hostel</span>
</div>
</body></html>
