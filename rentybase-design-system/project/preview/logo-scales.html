<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rb-canvas);font-family:var(--rb-font-sans);padding:20px;color:var(--rb-ink)}
  .row{display:flex;gap:24px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .tile{background:#0E1413;border-radius:22px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 22px -6px rgba(15,76,92,.35)}
  .tile::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 14%,rgba(201,122,58,.5),transparent 55%),radial-gradient(circle at 14% 96%,rgba(15,76,92,.6),transparent 60%)}
  .tile svg{position:relative;z-index:1}
  .small{border-radius:8px}
  .lab{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rb-ink-3)}
</style></head><body>
<div class="row">

  <div class="item">
    <div class="tile" style="width:128px;height:128px;border-radius:28px">
      <svg width="92" height="92" viewBox="0 0 200 200">
        <path d="M100 22 L176 88 V162 a14 14 0 0 1 -14 14 H38 a14 14 0 0 1 -14 -14 V88 Z" fill="#F6F4EE"/>
        <path d="M62 178 V128 a38 38 0 0 1 76 0 V178 Z" fill="#0E1413"/>
        <text x="100" y="170" text-anchor="middle" font-family="Bricolage Grotesque, sans-serif" font-size="46" font-weight="800" letter-spacing="-3" fill="#F6F4EE" style="font-variation-settings:'opsz' 96,'wdth' 75">RB</text>
        <rect x="60" y="172" width="80" height="6" rx="1" fill="#C97A3A"/>
        <circle cx="100" cy="46" r="3.2" fill="#C97A3A"/>
      </svg>
    </div>
    <span class="lab">128 · launcher</span>
  </div>

  <div class="item">
    <div class="tile" style="width:64px;height:64px;border-radius:14px">
      <svg width="46" height="46" viewBox="0 0 200 200">
        <path d="M100 22 L176 88 V162 a14 14 0 0 1 -14 14 H38 a14 14 0 0 1 -14 -14 V88 Z" fill="#F6F4EE"/>
        <path d="M62 178 V128 a38 38 0 0 1 76 0 V178 Z" fill="#0E1413"/>
        <text x="100" y="170" text-anchor="middle" font-family="Bricolage Grotesque, sans-serif" font-size="46" font-weight="800" letter-spacing="-3" fill="#F6F4EE" style="font-variation-settings:'opsz' 96,'wdth' 75">RB</text>
        <rect x="60" y="172" width="80" height="6" rx="1" fill="#C97A3A"/>
      </svg>
    </div>
    <span class="lab">64 · header</span>
  </div>

  <div class="item">
    <div class="tile small" style="width:32px;height:32px">
      <svg width="22" height="22" viewBox="0 0 200 200">
        <path d="M100 22 L176 88 V162 a14 14 0 0 1 -14 14 H38 a14 14 0 0 1 -14 -14 V88 Z" fill="#F6F4EE"/>
        <path d="M62 178 V128 a38 38 0 0 1 76 0 V178 Z" fill="#0E1413"/>
        <rect x="60" y="172" width="80" height="6" rx="1" fill="#C97A3A"/>
      </svg>
    </div>
    <span class="lab">32 · favicon</span>
  </div>

  <div class="item">
    <div class="tile small" style="width:16px;height:16px;border-radius:4px">
      <svg width="11" height="11" viewBox="0 0 200 200">
        <path d="M100 22 L176 88 V172 H24 V88 Z" fill="#F6F4EE"/>
      </svg>
    </div>
    <span class="lab">16 · tab</span>
  </div>

</div>
</body></html>
