<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- ── Primary ──────────────────────────────────────────────── -->
    <title>RentyBase — Rent Tracking & HRA Receipts for India</title>
    <meta name="description" content="Rent tracking, HRA receipts in one tap, move-in photo proof, deposit ledger, and repair requests — free rental management for Indian landlords and tenants." />
    <meta name="theme-color" content="#0E1413" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="RentyBase" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Apple PWA ─────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RentyBase" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />

    <!-- ── Icons ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/assets/icon-96.png" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/assets/icon-48.png" />
    <link rel="shortcut icon" href="/assets/favicon.png" />

    <!-- ── PWA Manifest ──────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph ────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://rentybase.com/" />
    <meta property="og:site_name"   content="RentyBase" />
    <meta property="og:title"       content="RentyBase — Rent Tracking & HRA Receipts for India" />
    <meta property="og:description" content="Everything Indian landlords and tenants need — rent tracking, HRA receipt generation, move-in photo proof, deposit protection, and repair management. Free during beta." />
    <meta property="og:image"       content="https://rentybase.com/assets/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="RentyBase — Property Management for India" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@rentybase" />
    <meta name="twitter:title"       content="RentyBase — Rent Tracking & HRA Receipts for India" />
    <meta name="twitter:description" content="HRA receipts, rent tracking, move-in photo proof & deposit ledger. Free rental management for Indian landlords and tenants." />
    <meta name="twitter:image"       content="https://rentybase.com/assets/og-image.png" />

    <!-- ── Splash screens (iOS) ──────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-startup-image" href="/assets/splash-icon.png" />

    <!-- ── Expo reset styles ─────────────────────────────────────── -->
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; background-color: #0E1413; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run RentyBase.</noscript>
    <div id="root"></div>
  </body>
</html>
